name: water_habit_app
description: "Water Habit Social Ecosystem - Build healthy habits together 🌿"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8

  # State Management - Riverpod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5
  firebase_storage: ^12.4.5
  firebase_analytics: ^11.5.3
  firebase_remote_config: ^5.3.5

  # Auth Providers
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI/Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # Charts
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4

  # Social Sharing
  share_plus: ^10.1.4
  screenshot: ^3.0.0

  # Local Storage
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Networking & Utils
  connectivity_plus: ^6.1.3
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

  # Animations
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
